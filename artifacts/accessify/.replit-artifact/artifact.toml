kind = "web"
previewPath = "/"
title = "Accessify"
version = "1.0.0"
id = "artifacts/accessify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25081

[services.development]
run = "pnpm --filter @workspace/accessify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/accessify", "run", "build" ]
publicDir = "artifacts/accessify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25081"
BASE_PATH = "/"
